<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <script src="script.js" defer></script>
    <link rel="stylesheet" href="style.css">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gjøremålsliste</title>
</head>
<body>
    <header>
        <h1>To do List</h1>
        <form id="task-form">
            
            <label for="task-input">Submit To do Task</label>
            <input 
                id="task-input"
                name="task-input"
                type="text"
            >
            <input type="submit">

        </form>

        <label for="show-completed">Vis Fullførte Tasks</label>
        <input type="checkbox" name="show-completed" id="show-completed">
    </header>

    <main id="list-container">

    </main>
    
</body>
</html>
